<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#09090F" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Репетитор" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>План на сегодня — Репетитор ОГЭ/ЕГЭ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    /* ─────────────────────────────────────────
       DESIGN TOKENS
    ───────────────────────────────────────── */
    :root {
      --bg:            #09090F;
      --bg-surface:    #10121A;
      --bg-elevated:   #161922;
      --bg-tabbar:     rgba(10, 11, 18, 0.94);

      --accent:        #5B6CF9;
      --accent-2:      #8B5CF6;
      --accent-dim:    rgba(91, 108, 249, 0.12);
      --accent-border: rgba(91, 108, 249, 0.28);
      --gradient:      linear-gradient(135deg, #5B6CF9 0%, #8B5CF6 100%);

      --success:       #34D399;
      --success-dim:   rgba(52, 211, 153, 0.12);
      --success-border:rgba(52, 211, 153, 0.30);

      --text:          #F1F5F9;
      --text-soft:     #94A3B8;
      --text-muted:    #4A5568;
      --text-accent:   #818CF8;

      --border:        rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.11);

      --radius-sm:  8px;
      --radius-md:  14px;
      --radius-lg:  18px;
      --radius-xl:  22px;

      --tabbar-h:   68px;
      --safe-bot:   env(safe-area-inset-bottom, 0px);
    }

    /* ─────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ─────────────────────────────────────────
       AMBIENT GLOW
    ───────────────────────────────────────── */
    .bg-glow {
      position: fixed;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(91,108,249,0.10) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─────────────────────────────────────────
       SCROLL AREA
    ───────────────────────────────────────── */
    .scroll-area {
      position: relative;
      z-index: 1;
      padding: 52px 20px calc(var(--tabbar-h) + var(--safe-bot) + 24px);
    }

    /* ─────────────────────────────────────────
       ANIMATIONS
    ───────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fillBar {
      from { width: 0; }
      to   { width: var(--w); }
    }

    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    .page-header {
      margin-bottom: 22px;
      animation: fadeUp 0.4s ease both;
    }
    .page-header__day {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-accent);
      margin-bottom: 6px;
    }
    .page-header__title {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.028em;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 7px;
    }
    .page-header__sub {
      font-size: 13px;
      color: var(--text-soft);
      font-weight: 400;
    }
    .page-header__sub strong {
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─────────────────────────────────────────
       PROGRESS CARD
    ───────────────────────────────────────── */
    .progress-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 14px;
      animation: fadeUp 0.4s ease 0.06s both;
    }
    .progress-card__label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .progress-card__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .progress-card__done {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.015em;
      color: var(--text);
    }
    .progress-card__pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }
    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar__fill {
      height: 100%;
      border-radius: 99px;
      background: var(--gradient);
      --w: 25%;
      width: 0;
      animation: fillBar 0.8s ease 0.5s both;
    }

    /* ─────────────────────────────────────────
       MAIN TASK CARD
    ───────────────────────────────────────── */
    .main-task-card {
      position: relative;
      border-radius: var(--radius-xl);
      padding: 20px;
      margin-bottom: 24px;
      overflow: hidden;
      animation: fadeUp 0.4s ease 0.10s both;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(58,68,210,0.55) 0%, rgba(100,60,200,0.45) 100%);
      border: 1px solid rgba(91,108,249,0.35);
    }
    /* Inner glow layers */
    .main-task-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 90% 10%, rgba(139,92,246,0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 10% 90%, rgba(91,108,249,0.25) 0%, transparent 55%);
      pointer-events: none;
    }
    /* Top shimmer line */
    .main-task-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }
    /* Blue dot top right */
    .main-task-card__dot {
      position: absolute;
      top: 18px; right: 18px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(91,108,249,0.9);
    }
    .main-task-card__label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 12px;
    }
    .main-task-card__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .main-task-card__title {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      line-height: 1.2;
      flex: 1;
    }
    .main-task-card__circle {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      flex-shrink: 0;
    }
    .main-task-card__meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .meta-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 99px;
      padding: 5px 10px;
    }
    .meta-badge svg { flex-shrink: 0; }
    .meta-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      padding: 5px 2px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .meta-action:hover { color: #fff; }

    /* ─────────────────────────────────────────
       STEPS SECTION
    ───────────────────────────────────────── */
    .steps-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      animation: fadeUp 0.4s ease 0.14s both;
    }
    .steps-list {
      margin-bottom: 14px;
      animation: fadeUp 0.4s ease 0.16s both;
    }
    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      position: relative;
      cursor: pointer;
    }
    .step-item:not(:last-child) { margin-bottom: 0; }

    /* Stem (dot + line) */
    .step-stem {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .step-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border-strong);
      background: var(--bg-surface);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }
    .step-dot.done {
      background: var(--success-dim);
      border-color: var(--success-border);
    }
    .step-dot.done svg { color: var(--success); }
    .step-line {
      width: 2px;
      background: var(--border);
      flex: 1;
      min-height: 28px;
      margin: 4px 0;
    }
    .step-item:last-child .step-line { display: none; }

    /* Content */
    .step-content {
      flex: 1;
      padding-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 0px;
    }
    .step-item:last-child .step-content { padding-bottom: 4px; }
    .step-body { flex: 1; }
    .step-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
      line-height: 1.3;
      transition: color 0.2s;
    }
    .step-name.done {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .step-time {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }
    .step-arrow { color: var(--text-muted); flex-shrink: 0; }

    /* ─────────────────────────────────────────
       MOTIVATION CARD
    ───────────────────────────────────────── */
    .motivation-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s ease 0.22s both;
    }
    .motivation-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(91,108,249,0.45), transparent);
    }
    .motivation-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 90% 50%, rgba(91,108,249,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    .motivation-icon {
      width: 40px; height: 40px;
      border-radius: 13px;
      background: linear-gradient(135deg, rgba(91,108,249,0.30) 0%, rgba(139,92,246,0.30) 100%);
      border: 1px solid rgba(91,108,249,0.35);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }
    .motivation-body { flex: 1; }
    .motivation-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-soft);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .motivation-text strong {
      font-weight: 800;
      color: var(--text);
    }
    .motivation-sub {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-accent);
    }

    /* ─────────────────────────────────────────
       PRIMARY CTA
    ───────────────────────────────────────── */
    .btn-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 56px;
      border-radius: 16px;
      background: var(--gradient);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
      box-shadow: 0 8px 32px rgba(91,108,249,0.4);
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
      animation: fadeUp 0.4s ease 0.26s both;
      text-decoration: none;
    }
    .btn-cta:active { opacity: 0.88; transform: scale(0.98); box-shadow: 0 4px 16px rgba(91,108,249,0.3); }

    /* ─────────────────────────────────────────
       TAB BAR
    ───────────────────────────────────────── */
    .tabbar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      height: calc(var(--tabbar-h) + var(--safe-bot));
      padding-bottom: var(--safe-bot);
      background: var(--bg-tabbar);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      padding-top: 10px;
      z-index: 100;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: opacity 0.15s;
      position: relative;
      text-decoration: none;
    }
    .tab:hover { opacity: 0.85; }
    .tab__icon { color: var(--text-muted); transition: color 0.15s; }
    .tab__label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.15s;
    }
    .tab.active .tab__icon { color: var(--accent); }
    .tab.active .tab__label { color: var(--accent); }
    .tab.active::before {
      content: '';
      position: absolute;
      top: -10px; left: 50%;
      transform: translateX(-50%);
      width: 28px; height: 3px;
      border-radius: 0 0 3px 3px;
      background: var(--gradient);
    }

    /* ─────────────────────────────────────────
       TOAST
    ───────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(var(--tabbar-h) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      max-width: 320px; width: calc(100% - 40px);
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 13px; font-weight: 500;
      color: var(--text-soft);
      text-align: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      backdrop-filter: blur(12px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <main class="scroll-area">

    <!-- ── HEADER ── -->
    <header class="page-header">
      <div class="page-header__day" id="headerDay">Загрузка...</div>
      <div class="page-header__title" id="headerTitle">Добрый день!</div>
      <div class="page-header__sub" id="headerSub">Готовься к экзамену</div>
    </header>

    <!-- ── LAST EXAM CARD ── -->
    <div id="lastExamCard" style="display:none">
      <div class="progress-card">
        <div class="progress-card__label">Последний экзамен</div>
        <div class="progress-card__row">
          <span class="progress-card__done" id="lastExamLabel">—</span>
          <span class="progress-card__pct" id="lastExamScore">—</span>
        </div>
        <div class="progress-bar">
          <div class="progress-bar__fill" id="lastExamBar" style="--w:0%;animation:none;width:0%"></div>
        </div>
      </div>
    </div>

    <!-- ── STATS CARD ── -->
    <div id="statsCard" style="display:none">
      <div class="motivation-card">
        <div class="motivation-icon">📊</div>
        <div class="motivation-body">
          <div class="motivation-text" id="statsText">—</div>
          <div class="motivation-sub" id="statsSubText">СТАТИСТИКА</div>
        </div>
      </div>
    </div>

    <!-- ── EMPTY STATE ── -->
    <div id="emptyState">
      <div class="motivation-card">
        <div class="motivation-icon">🎯</div>
        <div class="motivation-body">
          <div class="motivation-text">Пройди первый экзамен, чтобы увидеть свой прогресс</div>
          <div class="motivation-sub">ОГЭ · МАТЕМАТИКА ИЛИ РУССКИЙ ЯЗЫК</div>
        </div>
      </div>
    </div>

    <!-- ── CTA ── -->
    <a href="onboarding.html" class="btn-cta">
      Начать экзамен
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M4 9h10M10 5l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

  </main>

  <!-- ── TAB BAR ── -->
  <nav class="tabbar">
    <a href="today.html" class="tab active">
      <div class="tab__icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="3" y="3" width="7" height="7" rx="1.8" stroke="currentColor" stroke-width="1.5"/>
          <rect x="12" y="3" width="7" height="7" rx="1.8" stroke="currentColor" stroke-width="1.5"/>
          <rect x="3" y="12" width="7" height="7" rx="1.8" stroke="currentColor" stroke-width="1.5"/>
          <rect x="12" y="12" width="7" height="7" rx="1.8" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>
      <span class="tab__label">Главная</span>
    </a>
    <a href="theory.html" class="tab">
      <div class="tab__icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M4 19V6a2 2 0 012-2h12v13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M4 19a2 2 0 002 2h12a2 2 0 002-2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M9 9h6M9 12h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="tab__label">Уроки</span>
    </a>
    <a href="results.html" class="tab">
      <div class="tab__icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M4 17V10M8 17V7M12 17V12M16 17V5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="tab__label">Маршрут</span>
    </a>
    <a href="profile.html" class="tab">
      <div class="tab__icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 19c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="tab__label">Профиль</span>
    </a>
  </nav>

  <div class="toast" id="toast"></div>

  <script>
    const SB_URL = 'https://ahdxqfqbehsrdgwfpuuh.supabase.co';
    const SB_KEY = 'sb_publishable_by0lv1LEyc6NK4zwjz1vkQ_NT_4r4ny';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const DAYS = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    const SUBJECTS = { math: 'Математика', russian: 'Русский язык' };
    const EXAMS = { oge: 'ОГЭ', ege: 'ЕГЭ' };

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session?.user || session.user.is_anonymous) {
        window.location.replace('auth.html'); return;
      }

      const user = session.user;
      const firstName = user.user_metadata?.first_name || user.user_metadata?.full_name?.split(' ')[0] || 'Ученик';
      const hour = new Date().getHours();
      const greeting = hour < 12 ? 'Доброе утро' : hour < 18 ? 'Добрый день' : 'Добрый вечер';
      const dayName = DAYS[new Date().getDay()];

      document.getElementById('headerDay').textContent = `Сегодня, ${dayName.toLowerCase()}`;
      document.getElementById('headerTitle').textContent = `${greeting}, ${firstName}!`;

      // Загружаем последние сессии из Supabase
      const { data: sessions } = await sb
        .from('exam_sessions')
        .select('subject, exam_type, score, max_score, created_at')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false })
        .limit(5);

      if (sessions?.length) {
        document.getElementById('emptyState').style.display = 'none';

        // Последний экзамен
        const last = sessions[0];
        const pct = last.max_score > 0 ? Math.round(last.score / last.max_score * 100) : 0;
        const subjectLabel = SUBJECTS[last.subject] || last.subject;
        const examLabel = EXAMS[last.exam_type] || last.exam_type;
        document.getElementById('lastExamLabel').textContent = `${examLabel} · ${subjectLabel}`;
        document.getElementById('lastExamScore').textContent = `${last.score}/${last.max_score}`;
        const bar = document.getElementById('lastExamBar');
        bar.style.setProperty('--w', pct + '%');
        bar.style.width = pct + '%';
        document.getElementById('lastExamCard').style.display = '';

        // Статистика
        const total = sessions.length;
        const avgScore = Math.round(sessions.reduce((s, e) => s + (e.max_score > 0 ? e.score / e.max_score * 100 : 0), 0) / total);
        document.getElementById('statsText').innerHTML = `Попыток: <strong>${total}</strong> · Средний результат: <strong>${avgScore}%</strong>`;
        document.getElementById('statsSubText').textContent = 'МОЯ СТАТИСТИКА';
        document.getElementById('statsCard').style.display = '';
        document.getElementById('headerSub').textContent = 'Продолжай готовиться к экзамену';
      }
    }

    init();
  </script>

</body>
</html>
