<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#09090F" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Репетитор" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Войти — Репетитор ОГЭ/ЕГЭ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --bg:            #09090F;
      --bg-surface:    #10121A;
      --bg-elevated:   #161922;
      --accent:        #5B6CF9;
      --accent-2:      #8B5CF6;
      --accent-dim:    rgba(91,108,249,0.12);
      --accent-border: rgba(91,108,249,0.28);
      --gradient:      linear-gradient(135deg,#5B6CF9 0%,#8B5CF6 100%);
      --danger:        #F87171;
      --danger-dim:    rgba(248,113,113,0.10);
      --danger-border: rgba(248,113,113,0.28);
      --success:       #34D399;
      --text:          #F1F5F9;
      --text-soft:     #94A3B8;
      --text-muted:    #4A5568;
      --text-accent:   #818CF8;
      --border:        rgba(255,255,255,0.07);
      --radius-md:14px; --radius-lg:18px; --radius-xl:24px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{height:100%;}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg);color:var(--text);
      -webkit-font-smoothing:antialiased;
      min-height:100vh;min-height:100dvh;
      max-width:430px;margin:0 auto;
      display:flex;flex-direction:column;
      overflow-x:hidden;
    }
    button{font-family:inherit;cursor:pointer;border:none;background:none;}
    input{font-family:inherit;}

    .bg-glow{
      position:fixed;top:-100px;left:50%;transform:translateX(-50%);
      width:400px;height:400px;
      background:radial-gradient(circle,rgba(91,108,249,0.13) 0%,transparent 65%);
      pointer-events:none;z-index:0;
    }
    .bg-glow-2{
      position:fixed;bottom:0;right:-60px;
      width:260px;height:260px;
      background:radial-gradient(circle,rgba(139,92,246,0.08) 0%,transparent 65%);
      pointer-events:none;z-index:0;
    }

    .page{
      position:relative;z-index:1;
      flex:1;display:flex;flex-direction:column;
      padding:0 24px 40px;
    }

    /* LOGO */
    .logo-wrap{
      display:flex;align-items:center;justify-content:center;
      padding-top:52px;margin-bottom:40px;
      animation:fadeUp 0.4s ease both;
    }
    .logo{
      width:56px;height:56px;border-radius:18px;
      background:var(--gradient);
      display:flex;align-items:center;justify-content:center;
      font-size:26px;
      box-shadow:0 8px 32px rgba(91,108,249,0.4);
    }

    /* HERO */
    .hero{text-align:center;margin-bottom:36px;animation:fadeUp 0.4s ease 0.06s both;}
    .hero__title{font-size:26px;font-weight:900;letter-spacing:-0.03em;line-height:1.2;margin-bottom:8px;}
    .hero__title .grad{
      background:var(--gradient);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .hero__sub{font-size:14px;color:var(--text-soft);line-height:1.6;}

    /* TABS */
    .tabs{
      display:flex;background:var(--bg-surface);border:1px solid var(--border);
      border-radius:var(--radius-lg);padding:4px;margin-bottom:28px;
      animation:fadeUp 0.4s ease 0.1s both;
    }
    .tab-btn{
      flex:1;padding:11px;border-radius:calc(var(--radius-lg) - 3px);
      font-size:14px;font-weight:700;color:var(--text-muted);
      transition:all 0.2s;
    }
    .tab-btn.active{
      background:var(--gradient);color:#fff;
      box-shadow:0 2px 12px rgba(91,108,249,0.35);
    }

    /* FORM */
    .form{display:flex;flex-direction:column;gap:14px;animation:fadeUp 0.4s ease 0.14s both;}

    .field{display:flex;flex-direction:column;gap:6px;}
    .field__label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:0.05em;text-transform:uppercase;}
    .field__input{
      width:100%;padding:14px 16px;
      background:var(--bg-surface);
      border:1.5px solid var(--border);
      border-radius:var(--radius-md);
      font-size:15px;font-weight:500;color:var(--text);
      outline:none;transition:border-color 0.18s,box-shadow 0.18s;
      -webkit-appearance:none;
    }
    .field__input::placeholder{color:var(--text-muted);}
    .field__input:focus{
      border-color:var(--accent-border);
      box-shadow:0 0 0 3px var(--accent-dim);
    }
    .field__input.error{border-color:var(--danger-border);box-shadow:0 0 0 3px var(--danger-dim);}

    .field__name-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

    /* ERROR */
    .error-msg{
      background:var(--danger-dim);border:1px solid var(--danger-border);
      border-radius:var(--radius-md);padding:12px 14px;
      font-size:13px;color:var(--danger);line-height:1.5;
      display:none;animation:fadeUp 0.3s ease both;
    }
    .error-msg.visible{display:block;}

    /* SUBMIT */
    .btn-submit{
      width:100%;padding:16px;margin-top:4px;
      background:var(--gradient);border-radius:var(--radius-lg);
      font-size:15px;font-weight:800;color:#fff;
      box-shadow:0 4px 24px rgba(91,108,249,0.4);
      transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;
      animation:fadeUp 0.4s ease 0.18s both;
    }
    .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(91,108,249,0.55);}
    .btn-submit:active{transform:translateY(0);}
    .btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
    .btn-submit__spinner{
      width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);
      border-top-color:#fff;border-radius:50%;
      animation:spin 0.7s linear infinite;display:none;
    }
    .btn-submit.loading .btn-submit__spinner{display:block;}
    .btn-submit.loading .btn-submit__text{display:none;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* DIVIDER */
    .divider{
      display:flex;align-items:center;gap:12px;margin:6px 0;
      animation:fadeUp 0.4s ease 0.2s both;
    }
    .divider::before,.divider::after{
      content:'';flex:1;height:1px;background:var(--border);
    }
    .divider__text{font-size:11px;font-weight:600;color:var(--text-muted);white-space:nowrap;}

    /* GOOGLE BUTTON */
    .btn-google{
      width:100%;padding:14px;
      background:var(--bg-surface);border:1.5px solid var(--border);
      border-radius:var(--radius-lg);
      font-size:14px;font-weight:700;color:var(--text-soft);
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:all 0.18s;
      animation:fadeUp 0.4s ease 0.22s both;
    }
    .btn-google:hover{border-color:var(--accent-border);color:var(--text);}

    /* FOOTER NOTE */
    .auth-note{
      text-align:center;font-size:12px;color:var(--text-muted);
      margin-top:20px;line-height:1.6;
      animation:fadeUp 0.4s ease 0.24s both;
    }
    .auth-note a{color:var(--text-accent);font-weight:600;}

    /* FORGOT PASSWORD */
    .forgot-link{
      text-align:right;margin-top:-6px;
    }
    .forgot-link a{
      font-size:12px;color:var(--text-soft);font-weight:500;
      text-decoration:none;transition:color 0.18s;
    }
    .forgot-link a:hover{color:var(--text-accent);}

    /* MODAL */
    .modal-overlay{
      position:fixed;inset:0;z-index:100;
      background:rgba(9,9,15,0.85);backdrop-filter:blur(6px);
      display:flex;align-items:flex-end;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity 0.25s;
    }
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal-sheet{
      background:var(--bg-elevated);border:1px solid var(--border);
      border-radius:var(--radius-xl) var(--radius-xl) 0 0;
      padding:28px 24px 40px;width:100%;max-width:430px;
      transform:translateY(40px);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-overlay.open .modal-sheet{transform:translateY(0);}
    .modal-handle{
      width:36px;height:4px;border-radius:2px;
      background:var(--border);margin:0 auto 20px;
    }
    .modal-title{font-size:18px;font-weight:800;margin-bottom:6px;}
    .modal-sub{font-size:13px;color:var(--text-soft);margin-bottom:20px;line-height:1.5;}

    /* FIELD ERROR */
    .field__error{
      font-size:11px;color:var(--danger);font-weight:500;
      display:none;margin-top:2px;
    }
    .field__error.visible{display:block;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow-2"></div>

<div class="page">

  <div class="logo-wrap">
    <div class="logo">🎓</div>
  </div>

  <div class="hero">
    <div class="hero__title">Репетитор<br><span class="grad">ОГЭ и ЕГЭ</span></div>
    <div class="hero__sub">Войди в личный кабинет, чтобы отслеживать прогресс и сохранять результаты</div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" id="tabLogin"    onclick="switchTab('login')">Войти</button>
    <button class="tab-btn"        id="tabRegister" onclick="switchTab('register')">Регистрация</button>
  </div>

  <!-- ERROR -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- LOGIN FORM -->
  <form class="form" id="loginForm" onsubmit="handleLogin(event)" novalidate>
    <div class="field">
      <div class="field__label">Email</div>
      <input class="field__input" id="loginEmail" type="email" placeholder="твой@email.ru" autocomplete="email" required />
    </div>
    <div class="field">
      <div class="field__label">Пароль</div>
      <input class="field__input" id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" required />
    </div>
    <div class="forgot-link">
      <a href="#" onclick="openForgot();return false;">Забыли пароль?</a>
    </div>
    <button class="btn-submit" type="submit" id="btnLogin">
      <div class="btn-submit__spinner"></div>
      <span class="btn-submit__text">Войти</span>
    </button>
  </form>

  <!-- REGISTER FORM -->
  <form class="form" id="registerForm" style="display:none" onsubmit="handleRegister(event)" novalidate>
    <div class="field">
      <div class="field__label">Как тебя зовут?</div>
      <div class="field__name-row">
        <input class="field__input" id="regFirstName" type="text" placeholder="Имя" autocomplete="given-name" required />
        <input class="field__input" id="regLastName"  type="text" placeholder="Фамилия" autocomplete="family-name" />
      </div>
    </div>
    <div class="field">
      <div class="field__label">Email</div>
      <input class="field__input" id="regEmail" type="email" placeholder="твой@email.ru" autocomplete="email" required />
    </div>
    <div class="field">
      <div class="field__label">Пароль</div>
      <input class="field__input" id="regPassword" type="password" placeholder="Минимум 6 символов" autocomplete="new-password" minlength="6" required />
    </div>
    <button class="btn-submit" type="submit" id="btnRegister">
      <div class="btn-submit__spinner"></div>
      <span class="btn-submit__text">Создать аккаунт</span>
    </button>
  </form>


  <div class="auth-note" id="authNote">
    Нет аккаунта? <a href="#" onclick="switchTab('register');return false;">Зарегистрируйся</a>
  </div>

</div>

<!-- FORGOT PASSWORD MODAL -->
<div class="modal-overlay" id="forgotModal" onclick="closeForgotOutside(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Восстановление пароля</div>
    <div class="modal-sub">Введи email — мы пришлём ссылку для сброса пароля</div>
    <div class="field" style="margin-bottom:14px">
      <div class="field__label">Email</div>
      <input class="field__input" id="forgotEmail" type="email" placeholder="твой@email.ru" autocomplete="email" />
      <div class="field__error" id="forgotEmailError">Введи корректный email</div>
    </div>
    <div class="error-msg" id="forgotErrorMsg" style="margin-bottom:14px"></div>
    <button class="btn-submit" id="btnForgot" onclick="handleForgot()" type="button">
      <div class="btn-submit__spinner"></div>
      <span class="btn-submit__text">Отправить ссылку</span>
    </button>
  </div>
</div>

<script>
  const SB_URL = 'https://ahdxqfqbehsrdgwfpuuh.supabase.co';
  const SB_KEY = 'sb_publishable_by0lv1LEyc6NK4zwjz1vkQ_NT_4r4ny';
  const sb = supabase.createClient(SB_URL, SB_KEY);

  // Если уже залогинен — сразу на главную
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session?.user && !session.user.is_anonymous) {
      window.location.replace('today.html');
    }
  });

  let currentTab = 'login';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('loginForm').style.display    = tab === 'login'    ? 'flex' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
    document.getElementById('tabLogin').classList.toggle('active',    tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('authNote').innerHTML = tab === 'login'
      ? 'Нет аккаунта? <a href="#" onclick="switchTab(\'register\');return false;">Зарегистрируйся</a>'
      : 'Уже есть аккаунт? <a href="#" onclick="switchTab(\'login\');return false;">Войди</a>';
    clearError();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }
  function clearError() {
    document.getElementById('errorMsg').classList.remove('visible');
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.classList.toggle('loading', loading);
  }

  // Валидация полей
  function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()); }
  function notEmpty(v) { return v.trim().length > 0; }

  async function handleLogin(e) {
    e.preventDefault();
    clearError();

    const emailEl    = document.getElementById('loginEmail');
    const passwordEl = document.getElementById('loginPassword');

    let ok = true;
    if (!isEmail(emailEl.value)) {
      emailEl.classList.add('error');
      showError('Введи корректный email');
      ok = false;
    } else { emailEl.classList.remove('error'); }
    if (!passwordEl.value) {
      passwordEl.classList.add('error');
      if (ok) showError('Введи пароль');
      ok = false;
    } else { passwordEl.classList.remove('error'); }
    if (!ok) return;

    const email    = emailEl.value.trim();
    const password = passwordEl.value;
    setLoading('btnLogin', true);

    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading('btnLogin', false);

    if (error) {
      showError(error.message === 'Invalid login credentials'
        ? 'Неверный email или пароль'
        : 'Произошла ошибка. Попробуй ещё раз.');
      emailEl.classList.add('error');
      passwordEl.classList.add('error');
      return;
    }
    window.location.replace('today.html');
  }

  async function handleRegister(e) {
    e.preventDefault();
    clearError();

    const firstNameEl = document.getElementById('regFirstName');
    const emailEl     = document.getElementById('regEmail');
    const passwordEl  = document.getElementById('regPassword');

    let ok = true;
    if (!notEmpty(firstNameEl.value)) {
      firstNameEl.classList.add('error');
      showError('Введи своё имя');
      ok = false;
    } else { firstNameEl.classList.remove('error'); }
    if (!isEmail(emailEl.value)) {
      emailEl.classList.add('error');
      if (ok) showError('Введи корректный email');
      ok = false;
    } else { emailEl.classList.remove('error'); }
    if (passwordEl.value.length < 6) {
      passwordEl.classList.add('error');
      if (ok) showError('Пароль должен быть не менее 6 символов');
      ok = false;
    } else { passwordEl.classList.remove('error'); }
    if (!ok) return;

    const firstName = firstNameEl.value.trim();
    const lastName  = document.getElementById('regLastName').value.trim();
    const email     = emailEl.value.trim();
    const password  = passwordEl.value;
    setLoading('btnRegister', true);

    const { data: signUpData, error: signUpError } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: {
          full_name:  (firstName + ' ' + lastName).trim(),
          first_name: firstName,
          last_name:  lastName,
        }
      }
    });

    if (signUpError) {
      setLoading('btnRegister', false);
      const msg = signUpError.message.includes('already registered')
        ? 'Этот email уже зарегистрирован. Войди или используй другой email.'
        : signUpError.message.includes('password')
        ? 'Пароль слишком простой. Минимум 6 символов.'
        : signUpError.message;
      showError(msg);
      return;
    }

    // Если email подтверждение отключено в Supabase — сессия уже есть
    if (signUpData?.session) {
      window.location.replace('onboarding.html');
      return;
    }

    // Иначе пробуем автологин
    const { error: loginError } = await sb.auth.signInWithPassword({ email, password });
    setLoading('btnRegister', false);

    if (!loginError) {
      window.location.replace('onboarding.html');
      return;
    }

    // Подтверждение email требуется
    document.getElementById('registerForm').innerHTML = `
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:40px;margin-bottom:16px">📬</div>
        <div style="font-size:18px;font-weight:800;margin-bottom:8px">Проверь почту</div>
        <div style="font-size:14px;color:var(--text-soft);line-height:1.65">
          Мы отправили письмо на <strong style="color:var(--text-accent)">${email}</strong>.<br>
          Нажми на ссылку в письме, чтобы войти.
        </div>
      </div>`;
  }

  // FORGOT PASSWORD
  function openForgot() {
    const emailVal = document.getElementById('loginEmail').value.trim();
    if (isEmail(emailVal)) document.getElementById('forgotEmail').value = emailVal;
    document.getElementById('forgotModal').classList.add('open');
    document.getElementById('forgotErrorMsg').classList.remove('visible');
    document.getElementById('forgotEmailError').classList.remove('visible');
  }
  function closeForgot() {
    document.getElementById('forgotModal').classList.remove('open');
  }
  function closeForgotOutside(e) {
    if (e.target === document.getElementById('forgotModal')) closeForgot();
  }

  async function handleForgot() {
    const emailEl = document.getElementById('forgotEmail');
    const errEl   = document.getElementById('forgotEmailError');
    const msgEl   = document.getElementById('forgotErrorMsg');

    emailEl.classList.remove('error');
    errEl.classList.remove('visible');
    msgEl.classList.remove('visible');

    if (!isEmail(emailEl.value)) {
      emailEl.classList.add('error');
      errEl.classList.add('visible');
      return;
    }

    setLoading('btnForgot', true);
    const { error } = await sb.auth.resetPasswordForEmail(emailEl.value.trim(), {
      redirectTo: window.location.origin + '/app/auth.html'
    });
    setLoading('btnForgot', false);

    if (error) {
      msgEl.textContent = 'Не удалось отправить письмо. Проверь email и попробуй ещё раз.';
      msgEl.classList.add('visible');
      return;
    }

    document.querySelector('#forgotModal .modal-sheet').innerHTML = `
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:40px;margin-bottom:16px">📬</div>
        <div style="font-size:18px;font-weight:800;margin-bottom:8px">Письмо отправлено</div>
        <div style="font-size:14px;color:var(--text-soft);line-height:1.65">
          Проверь почту <strong style="color:var(--text-accent)">${emailEl.value.trim()}</strong><br>
          и нажми на ссылку для сброса пароля.
        </div>
        <button class="btn-submit" style="margin-top:24px" onclick="closeForgot()" type="button">
          <span class="btn-submit__text">Закрыть</span>
        </button>
      </div>`;
  }
</script>

</body>
</html>
