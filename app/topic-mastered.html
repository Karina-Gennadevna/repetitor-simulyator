<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Тема закреплена — Репетитор ОГЭ/ЕГЭ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:            #09090F;
      --bg-surface:    #10121A;
      --bg-elevated:   #161922;
      --accent:        #5B6CF9;
      --accent-2:      #8B5CF6;
      --accent-dim:    rgba(91,108,249,0.12);
      --accent-border: rgba(91,108,249,0.28);
      --gradient:      linear-gradient(135deg,#5B6CF9 0%,#8B5CF6 100%);
      --success:       #34D399;
      --success-dim:   rgba(52,211,153,0.10);
      --success-border:rgba(52,211,153,0.28);
      --text:          #F1F5F9;
      --text-soft:     #94A3B8;
      --text-muted:    #4A5568;
      --text-accent:   #818CF8;
      --border:        rgba(255,255,255,0.07);
      --border-soft:   rgba(255,255,255,0.04);
      --radius-md:14px; --radius-lg:18px; --radius-xl:24px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg);color:var(--text);
      -webkit-font-smoothing:antialiased;
      min-height:100vh;min-height:100dvh;
      max-width:430px;margin:0 auto;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:24px 20px 36px;
      overflow:hidden;position:relative;
    }
    button{font-family:inherit;cursor:pointer;border:none;background:none;}

    /* ── AMBIENT ── */
    .glow-top{
      position:fixed;top:-120px;left:50%;transform:translateX(-50%);
      width:480px;height:480px;
      background:radial-gradient(circle,rgba(52,211,153,0.13) 0%,rgba(91,108,249,0.08) 45%,transparent 70%);
      pointer-events:none;z-index:0;
      animation:glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse{0%,100%{opacity:0.8;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.05);}}

    /* ── CONFETTI PARTICLES ── */
    .particle{
      position:fixed;border-radius:2px;
      animation:fall linear forwards;
      pointer-events:none;z-index:0;
    }
    @keyframes fall{
      0%  {transform:translateY(-20px) rotate(0deg);   opacity:1;}
      100%{transform:translateY(110vh) rotate(720deg); opacity:0;}
    }

    /* ── CONTENT ── */
    .content{
      position:relative;z-index:1;
      display:flex;flex-direction:column;
      align-items:center;width:100%;gap:0;
    }

    /* ── ICON ── */
    .trophy-wrap{
      position:relative;margin-bottom:20px;
      animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn{from{opacity:0;transform:scale(0.4);}to{opacity:1;transform:scale(1);}}
    .trophy-ring{
      width:96px;height:96px;border-radius:50%;
      background:var(--success-dim);
      border:2px solid var(--success-border);
      display:flex;align-items:center;justify-content:center;
      font-size:44px;
      box-shadow:0 0 0 0 rgba(52,211,153,0.4);
      animation:ringPulse 2s ease-in-out 0.6s infinite;
    }
    @keyframes ringPulse{
      0%  {box-shadow:0 0 0 0   rgba(52,211,153,0.4);}
      70% {box-shadow:0 0 0 20px rgba(52,211,153,0);}
      100%{box-shadow:0 0 0 0   rgba(52,211,153,0);}
    }

    /* ── HEADLINE ── */
    .headline{
      text-align:center;margin-bottom:24px;
      animation:fadeUp 0.5s ease 0.15s both;
    }
    .headline__top{
      font-size:11px;font-weight:700;letter-spacing:0.12em;
      text-transform:uppercase;color:var(--success);
      margin-bottom:10px;
      display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .headline__top::before,.headline__top::after{
      content:'';display:block;width:28px;height:1px;
      background:linear-gradient(90deg,transparent,rgba(52,211,153,0.5));
    }
    .headline__top::after{transform:scaleX(-1);}
    .headline__title{
      font-size:38px;font-weight:900;letter-spacing:-0.04em;
      line-height:1.05;margin-bottom:8px;
    }
    .headline__title .grad{
      background:linear-gradient(135deg,#34D399,#059669);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .headline__sub{
      font-size:15px;font-weight:600;color:var(--text-soft);
      letter-spacing:-0.01em;
    }

    /* ── BOOST PILL ── */
    .boost-pill{
      display:inline-flex;align-items:center;gap:8px;
      background:var(--success-dim);
      border:1.5px solid var(--success-border);
      border-radius:20px;
      padding:10px 18px;
      margin-bottom:28px;
      animation:fadeUp 0.5s ease 0.22s both;
    }
    .boost-pill__icon{font-size:16px;}
    .boost-pill__text{
      font-size:14px;font-weight:700;color:var(--success);
      letter-spacing:-0.01em;
    }
    .boost-pill__text span{
      font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:800;
    }

    /* ── PROGRESS CARD ── */
    .progress-card{
      width:100%;
      background:var(--bg-surface);
      border:1px solid var(--border);
      border-radius:var(--radius-xl);
      padding:20px;
      margin-bottom:24px;
      position:relative;overflow:hidden;
      animation:fadeUp 0.5s ease 0.3s both;
    }
    .progress-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(52,211,153,0.45),transparent);
    }
    .progress-card__label{
      font-size:10px;font-weight:700;letter-spacing:0.1em;
      text-transform:uppercase;color:var(--text-muted);
      margin-bottom:14px;display:flex;align-items:center;gap:6px;
    }
    .topic-name{
      font-size:16px;font-weight:900;letter-spacing:-0.02em;
      color:var(--text);margin-bottom:16px;
    }

    /* Numbers row */
    .pct-row{
      display:flex;align-items:center;gap:10px;
      margin-bottom:12px;
    }
    .pct-old{
      font-family:'JetBrains Mono',monospace;
      font-size:28px;font-weight:800;
      color:var(--text-muted);
      letter-spacing:-0.03em;
    }
    .pct-arrow{
      display:flex;flex-direction:column;align-items:center;gap:2px;
      flex:1;
    }
    .pct-arrow__line{
      width:100%;height:2px;
      background:linear-gradient(90deg,var(--text-muted),var(--success));
      border-radius:1px;position:relative;
    }
    .pct-arrow__line::after{
      content:'';position:absolute;right:-1px;top:50%;
      transform:translateY(-50%);
      border:5px solid transparent;
      border-left:6px solid var(--success);
      margin-right:-6px;
    }
    .pct-delta{
      font-family:'JetBrains Mono',monospace;
      font-size:11px;font-weight:700;color:var(--success);
    }
    .pct-new{
      font-family:'JetBrains Mono',monospace;
      font-size:28px;font-weight:800;
      letter-spacing:-0.03em;
      background:linear-gradient(135deg,#34D399,#059669);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    /* Bar track */
    .bar-wrap{position:relative;height:10px;}
    .bar-track{
      height:10px;background:var(--bg-elevated);
      border-radius:5px;overflow:hidden;
    }
    .bar-old{
      position:absolute;top:0;left:0;height:10px;
      background:var(--text-muted);border-radius:5px;
      opacity:0.35;
      transition:width 0.9s cubic-bezier(0.34,1.2,0.64,1);
    }
    .bar-new{
      position:absolute;top:0;left:0;height:10px;
      background:linear-gradient(90deg,#34D399,#059669);
      border-radius:5px;
      box-shadow:0 0 10px rgba(52,211,153,0.4);
      transition:width 1.1s cubic-bezier(0.34,1.56,0.64,1) 0.15s;
    }

    /* Stats row */
    .stats-mini{
      display:grid;grid-template-columns:repeat(3,1fr);
      gap:8px;margin-top:14px;
    }
    .stat-mini{
      background:var(--bg-elevated);border:1px solid var(--border);
      border-radius:var(--radius-md);padding:10px 8px;text-align:center;
    }
    .stat-mini__val{
      font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;
      color:var(--text);display:block;margin-bottom:2px;
    }
    .stat-mini__val.green{color:var(--success);}
    .stat-mini__key{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);}

    /* ── ACTIONS ── */
    .actions{
      width:100%;display:flex;flex-direction:column;gap:10px;
      animation:fadeUp 0.5s ease 0.38s both;
    }
    .btn-primary{
      width:100%;padding:17px;
      background:var(--gradient);border-radius:var(--radius-lg);
      font-size:15px;font-weight:800;color:#fff;
      box-shadow:0 4px 24px rgba(91,108,249,0.4);
      transition:all 0.2s;
      display:flex;align-items:center;justify-content:center;gap:9px;
    }
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(91,108,249,0.55);}
    .btn-primary:active{transform:translateY(0);}
    .btn-secondary{
      width:100%;padding:15px;
      background:var(--bg-surface);
      border:1.5px solid var(--border);
      border-radius:var(--radius-lg);
      font-size:14px;font-weight:700;color:var(--text-soft);
      transition:all 0.18s;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn-secondary:hover{border-color:var(--success-border);color:var(--success);}

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>

  <div class="glow-top"></div>

  <div class="content">

    <!-- TROPHY -->
    <div class="trophy-wrap">
      <div class="trophy-ring">🏆</div>
    </div>

    <!-- HEADLINE -->
    <div class="headline">
      <div class="headline__top">Результат</div>
      <div class="headline__title"><span class="grad">Отлично!</span></div>
      <div class="headline__sub">Тема закреплена</div>
    </div>

    <!-- BOOST PILL -->
    <div class="boost-pill">
      <span class="boost-pill__icon">📈</span>
      <span class="boost-pill__text"><span id="deltaVal">+19%</span> к вероятности правильного ответа</span>
    </div>

    <!-- PROGRESS CARD -->
    <div class="progress-card">
      <div class="progress-card__label">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M1 9L4.5 5.5L7 8L11 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
        </svg>
        Прогресс по теме
      </div>

      <div class="topic-name" id="topicName">Линейные уравнения</div>

      <div class="pct-row">
        <div class="pct-old" id="pctOld">39%</div>
        <div class="pct-arrow">
          <div class="pct-arrow__line"></div>
          <div class="pct-delta" id="pctDelta">+19%</div>
        </div>
        <div class="pct-new" id="pctNew">58%</div>
      </div>

      <div class="bar-wrap">
        <div class="bar-track"></div>
        <div class="bar-old" id="barOld" style="width:0%"></div>
        <div class="bar-new" id="barNew" style="width:0%"></div>
      </div>

      <div class="stats-mini">
        <div class="stat-mini">
          <span class="stat-mini__val" id="statCorrect">3/3</span>
          <span class="stat-mini__key">Верных</span>
        </div>
        <div class="stat-mini">
          <span class="stat-mini__val green" id="statStreak">🔥 1</span>
          <span class="stat-mini__key">Серия</span>
        </div>
        <div class="stat-mini">
          <span class="stat-mini__val" id="statTime">4 мин</span>
          <span class="stat-mini__key">Потрачено</span>
        </div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="btn-primary" onclick="goRoute()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 7H13M13 7L9 3M13 7L9 11" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Вернуться к маршруту
      </button>
      <button class="btn-secondary" onclick="goNext()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M5.5 4.5L8.5 7L5.5 9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Следующая слабая тема
      </button>
    </div>

  </div>

  <script>
    /* ── ПАРАМЕТРЫ ─────────────────────── */
    const p       = new URLSearchParams(window.location.search);
    const topic   = p.get('topic')   || 'Линейные уравнения';
    const oldPct  = parseInt(p.get('old')  || '39');
    const newPct  = parseInt(p.get('new')  || '58');
    const delta   = newPct - oldPct;
    const correct = p.get('correct') || '3/3';
    const streak  = p.get('streak')  || '1';
    const mins    = p.get('mins')    || '4';

    /* ── ЗАПОЛНИТЬ ─────────────────────── */
    document.getElementById('topicName').textContent  = topic;
    document.getElementById('pctOld').textContent     = oldPct + '%';
    document.getElementById('pctNew').textContent     = newPct + '%';
    document.getElementById('pctDelta').textContent   = '+' + delta + '%';
    document.getElementById('deltaVal').textContent   = '+' + delta + '%';
    document.getElementById('statCorrect').textContent= correct;
    document.getElementById('statStreak').textContent = '🔥 ' + streak;
    document.getElementById('statTime').textContent   = mins + ' мин';

    /* ── АНИМАЦИЯ БАРОВ ────────────────── */
    setTimeout(() => {
      document.getElementById('barOld').style.width = oldPct + '%';
    }, 350);
    setTimeout(() => {
      document.getElementById('barNew').style.width = newPct + '%';
    }, 500);

    /* ── КОНФЕТТИ ──────────────────────── */
    const colors = ['#34D399','#5B6CF9','#8B5CF6','#F59E0B','#F87171','#60A5FA','#fff'];
    function burst() {
      for (let i = 0; i < 55; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        const size = 5 + Math.random() * 8;
        el.style.cssText = `
          width:${size}px;height:${size * (Math.random() > 0.5 ? 2.5 : 1)}px;
          left:${10 + Math.random() * 80}%;
          top:${-10}px;
          background:${colors[Math.floor(Math.random() * colors.length)]};
          opacity:${0.7 + Math.random() * 0.3};
          border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
          animation-duration:${1.8 + Math.random() * 1.6}s;
          animation-delay:${Math.random() * 0.5}s;
        `;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }
    burst();
    setTimeout(burst, 700);

    /* ── НАВИГАЦИЯ ─────────────────────── */
    function goRoute()  { window.location.href = 'results.html'; }
    function goNext()   { window.location.href = 'paywall.html?from=topic-mastered'; }
  </script>

</body>
</html>
